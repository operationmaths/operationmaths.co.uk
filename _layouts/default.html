<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{% if page.body_class %}{{ page.body_class }}{% endif %}">
  {% include header.html %}
  {{ content }}
  {% include footer.html %}
  <button class="back-to-top" id="backToTop" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>
  <script>
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function() {
      btn.classList.toggle('visible', window.scrollY > (window.innerWidth <= 600 ? 600 : 800));
    });
  </script>
</body>
</html>
