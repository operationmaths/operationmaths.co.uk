backend:
  name: git-gateway
  branch: main

# Netlify Identity
local_backend: false

media_folder: "assets/images"
public_folder: "/assets/images"

# ─────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────

collections:

  # ── TIMES TABLES ────────────────────────────
  - name: "times-tables"
    label: "Times Tables"
    label_singular: "Worksheet"
    folder: "_worksheets"
    filter: { field: "topic", value: "times-tables" }
    media_folder: "/assets/images/worksheets/times-tables"
    public_folder: "/assets/images/worksheets/times-tables"
    create: true
    slug: "times-tables-{{slug}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - { label: "Topic", name: "topic", widget: "hidden", default: "times-tables" }
      - label: "Section"
        name: "section"
        widget: "string"
        hint: "Group heading, e.g. 'Times table tests'. A new name creates a new section automatically."
      - label: "Order within section"
        name: "order"
        widget: "number"
        default: 1
        value_type: "int"
        hint: "Lower numbers appear first."
      - label: "Orientation"
        name: "orientation"
        widget: "select"
        options:
          - { label: "Portrait", value: "portrait" }
          - { label: "Landscape", value: "landscape" }
        default: "portrait"
        hint: "Controls the placeholder size if no thumbnail is uploaded."
      - label: "Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Short description shown on the card (1–2 sentences)."
      - label: "Worksheet thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false
        hint: "Upload a preview image of the worksheet."
      - label: "Show (A) on worksheet button"
        name: "show_a_worksheet"
        widget: "boolean"
        default: true
        hint: "Uncheck to show 'Worksheet' instead of 'Worksheet (A)'."
      - label: "Show (A) on answers button"
        name: "show_a_answers"
        widget: "boolean"
        default: true
        hint: "Uncheck to show 'Answers' instead of 'Answers (A)'."
      - label: "Free sample PDF link"
        name: "free_pdf"
        widget: "string"
        required: false
        hint: "Path to the PDF, e.g. /pdfs/2-times-table.pdf"
      - label: "Answers PDF link"
        name: "answers_pdf"
        widget: "string"
        required: false
        hint: "Path to the answers PDF, e.g. /pdfs/2-times-table-ANSWERS.pdf"
      - label: "Full pack TES URL"
        name: "tes_url"
        widget: "string"
        required: false
        hint: "Full URL of the TES listing for the paid pack."

