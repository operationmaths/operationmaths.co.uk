title: Operation Maths
description: Maths worksheets, books and tuition for primary and secondary students.
url: "https://operationmaths.github.io"
baseurl: "/operationmaths.co.uk"

# Build
timezone: Europe/London
markdown: kramdown
permalink: /:name/

# Collections
collections:
  worksheets:
    output: false
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "worksheets"
    values:
      layout: null
  - scope:
      path: "admin"
    values:
      layout: null

# Plugins
plugins:
  - jekyll-sitemap

# Sitemap
# jekyll-sitemap reads url + baseurl automatically

# Sass
sass:
  style: compressed

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
