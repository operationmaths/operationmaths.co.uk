<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }} | Maths Worksheets &amp; Tuition{% endif %}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

<!-- Canonical -->
<link rel="canonical" href="{{ site.url }}{{ page.url | remove: 'index.html' }}">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">

<!-- Open Graph -->
<meta property="og:title"       content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:image"       content="{{ site.url }}/assets/images/og-image.png">
<meta property="og:url"         content="{{ site.url }}{{ page.url }}">
<meta property="og:type"        content="website">

<!-- Stylesheet -->
<link rel="stylesheet" href="/assets/css/main.css">

{% if page.url == "/" %}
<!-- Schema: WebSite + Organization (homepage only) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "url": "{{ site.url }}/",
      "name": "{{ site.title }}",
      "description": "{{ site.description }}"
    },
    {
      "@type": "Organization",
      "@id": "{{ site.url }}/#organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}/",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.url }}/assets/images/logo.png"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "operationmaths123@gmail.com"
      }
    }
  ]
}
</script>
{% endif %}
